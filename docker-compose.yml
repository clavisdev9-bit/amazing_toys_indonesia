services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: hybrid_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: amazing_toys_hybrid
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - hybrid_postgres_data:/var/lib/postgresql/data
      # Init scripts run once, in alphabetical order, on first startup
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
      - ./backend/migrations/001_job_run_log.sql:/docker-entrypoint-initdb.d/03_job_run_log.sql:ro
      - ./integration/migrations/001_integration_tables.sql:/docker-entrypoint-initdb.d/04_integration_tables.sql:ro
      - ./backend/migrations/002_odoo_company.sql:/docker-entrypoint-initdb.d/05_odoo_company.sql:ro
      - ./backend/migrations/003_customers_birth_date.sql:/docker-entrypoint-initdb.d/06_customers_birth_date.sql:ro
      - ./backend/migrations/004_mock_catalogue_products.sql:/docker-entrypoint-initdb.d/07_mock_catalogue_products.sql:ro
      - ./backend/migrations/005_add_tax_columns.sql:/docker-entrypoint-initdb.d/08_add_tax_columns.sql:ro
      - ./backend/migrations/005_bca_qris_transactions.sql:/docker-entrypoint-initdb.d/09_bca_qris_transactions.sql:ro
      - ./backend/migrations/006_add_odoo_categ_name.sql:/docker-entrypoint-initdb.d/10_add_odoo_categ_name.sql:ro
      - ./backend/migrations/007_sample_stock_and_categories.sql:/docker-entrypoint-initdb.d/11_sample_stock_and_categories.sql:ro
      - ./backend/migrations/008_wishlists.sql:/docker-entrypoint-initdb.d/12_wishlists.sql:ro
      - ./backend/migrations/009_stock_sync_log.sql:/docker-entrypoint-initdb.d/13_stock_sync_log.sql:ro
      - ./backend/migrations/009_payment_voucher_xref.sql:/docker-entrypoint-initdb.d/14_payment_voucher_xref.sql:ro
      - ./backend/migrations/010_voucher_tables.sql:/docker-entrypoint-initdb.d/15_voucher_tables.sql:ro
      - ./backend/migrations/011_cr035_hybrid_model_c.sql:/docker-entrypoint-initdb.d/16_cr035_hybrid_model_c.sql:ro
      - ./backend/migrations/012_cr035_seed_helper.sql:/docker-entrypoint-initdb.d/17_cr035_seed_helper.sql:ro
      - ./backend/migrations/013_cr036_qr_delivery.sql:/docker-entrypoint-initdb.d/18_cr036_qr_delivery.sql:ro
      - ./backend/migrations/014_cr036_waha_session.sql:/docker-entrypoint-initdb.d/19_cr036_waha_session.sql:ro
      - ./backend/migrations/015_cr040_helper_approve.sql:/docker-entrypoint-initdb.d/20_cr040_helper_approve.sql:ro
      - ./backend/migrations/016_drop_expires_at_not_null.sql:/docker-entrypoint-initdb.d/21_drop_expires_at_not_null.sql:ro
      - ./backend/migrations/024_customer_otp_devices.sql:/docker-entrypoint-initdb.d/25_customer_otp_devices.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d amazing_toys_hybrid"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hybrid-net

  # ── Backend (Node.js / Express) ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hybrid_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: amazing_toys_hybrid
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SSL: "false"
      DB_POOL_MIN: 2
      DB_POOL_MAX: 10
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      CUSTOMER_TOKEN_EXPIRES_IN: ${CUSTOMER_TOKEN_EXPIRES_IN:-24h}
      TXN_PENDING_TIMEOUT_MINUTES: ${TXN_PENDING_TIMEOUT_MINUTES:-30}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_NOTIFY_TO: ${EMAIL_NOTIFY_TO}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      OTP_TTL_MINUTES: ${OTP_TTL_MINUTES:-5}
      DEVICE_TRUST_DAYS: ${DEVICE_TRUST_DAYS:-30}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-3}
      PRINTER_IP: ${PRINTER_IP}
      PRINTER_PORT: ${PRINTER_PORT:-9100}
      INTEGRATION_WEBHOOK_URL: http://integration:4000
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    ports:
      - "${BACKEND_DEV_PORT:-3002}:3001"
    volumes:
      - hybrid_uploads_data:/app/public/uploads
      - hybrid_config_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hybrid-net

  # ── Integration Service (Odoo sync) ─────────────────────────────────────────
  integration:
    build:
      context: ./integration
      dockerfile: Dockerfile
    container_name: hybrid_integration
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SOS_BASE_URL: http://backend:3001/api/v1
      SOS_ADMIN_USERNAME: ${SOS_ADMIN_USERNAME:-integration_admin}
      SOS_ADMIN_PASSWORD: ${SOS_ADMIN_PASSWORD}
      ODOO_BASE_URL: ${ODOO_BASE_URL}
      ODOO_DB: ${ODOO_DB}
      ODOO_LOGIN: ${ODOO_LOGIN}
      ODOO_PASSWORD: ${ODOO_PASSWORD}
      ODOO_WALKIN_PARTNER_ID: ${ODOO_WALKIN_PARTNER_ID}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      XREF_DB_URL: postgresql://postgres:${DB_PASSWORD}@postgres:5432/amazing_toys_hybrid
      LOW_STOCK_THRESHOLD: ${LOW_STOCK_THRESHOLD:-10}
      PRODUCT_SYNC_INTERVAL_MIN: ${PRODUCT_SYNC_INTERVAL_MIN:-30}
      STOCK_SYNC_INTERVAL_MIN: ${STOCK_SYNC_INTERVAL_MIN:-30}
      SWEEP_INTERVAL_MIN: ${SWEEP_INTERVAL_MIN:-5}
      POLLING_INTERVAL_SEC: ${POLLING_INTERVAL_SEC:-60}
      RETRY_MAX_ATTEMPTS: ${RETRY_MAX_ATTEMPTS:-3}
      CIRCUIT_BREAKER_THRESHOLD: ${CIRCUIT_BREAKER_THRESHOLD:-5}
      CIRCUIT_BREAKER_RESET_MIN: ${CIRCUIT_BREAKER_RESET_MIN:-2}
      TENANT_PRODUCT_MAPPING: ${TENANT_PRODUCT_MAPPING:-{}}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-T001}
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - hybrid-net

  # ── WAHA (Self-hosted WhatsApp HTTP API) ────────────────────────────────────
  sos_waha:
    image: devlikeapro/waha
    container_name: hybrid_waha
    restart: unless-stopped
    environment:
      - WHATSAPP_API_KEY=${WAHA_API_KEY:-}
      - WAHA_DASHBOARD_USERNAME=${WAHA_DASHBOARD_USERNAME:-admin}
      - WAHA_DASHBOARD_PASSWORD=${WAHA_DASHBOARD_PASSWORD:-AmazingToys2026}
    volumes:
      - waha_data:/app/.sessions
    networks:
      - hybrid-net
    ports:
      - "3010:3000"

  # ── Frontend (React → Nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hybrid_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - hybrid-net

volumes:
  hybrid_postgres_data:
  hybrid_uploads_data:
  hybrid_config_data:
  waha_data:

networks:
  hybrid-net:
    driver: bridge
